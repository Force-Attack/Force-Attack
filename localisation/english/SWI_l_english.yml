SWI_neutral_economics:0 "Neutral Economics"

SWI_great_depresion:0 "Great Depression"
SWI_great_depresion_2:0 "Great Depression"
SWI_great_depresion_3:0 "Great Depression"
SWI_great_depresion_4:0 "Great Depression"
SWI_great_depresion_desc:0 "Switzerland, long a bastion of neutrality and financial stability, finds itself increasingly strained under the weight of the Great Depression. As global trade collapses and foreign investments dry up, the nation’s once-thriving banking sector faces mounting pressure. Unemployment rises even in the prosperous cantons, and political tensions simmer beneath the surface of unity."
SWI_protectionism:0 "Protectionism"
SWI_protectionism_desc:0 "With global markets in freefall following the Great Depression, Switzerland abandons its reliance on open trade and turns inward to preserve its fragile economy. Facing collapsing exports and rising unemployment, the Federal Council enacts strict tariffs, import quotas, and financial controls to protect domestic industries and agriculture."
SWI_protectionism_idea:0 "Protectionism"
SWI_protectionism_idea_desc:0 "Though protectionism may safeguard the Confederation in the short term, overreliance on such policies risks stagnation and diplomatic friction with its neighbors."
SWI_protectionism_idea_1:0 "Protectionism"
SWI_protectionism_idea_desc_1:0 "Though protectionism may safeguard the Confederation in the short term, overreliance on such policies risks stagnation and diplomatic friction with its neighbors."
SWI_protectionism_idea_2:0 "Protectionism"
SWI_protectionism_idea_desc_2:0 "Though protectionism may safeguard the Confederation in the short term, overreliance on such policies risks stagnation and diplomatic friction with its neighbors."
SWI_exspand_tarif:0 "Expand Protecionist Polices"
SWI_exspand_tarif_desc:0 "By expanding tariffs, tightening import quotas, and increasing state oversight of key industries, we can further insulate our economy from foreign collapse. Domestic production will be prioritized, and Swiss businesses will be shielded from external competition at all costs."
SWI_domestic_invesments:0 "Domestic Invesments"
SWI_domestic_invesments_desc:0 "By encouraging domestic banks, industries, and cantonal governments to reinvest within our borders, we can stimulate growth, reduce unemployment, and modernize key sectors of the economy. Infrastructure projects, industrial expansion, and agricultural support will ensure that Swiss wealth serves Swiss interests."
SWI_ban_rothschilds:0 "Ban Rothschilds"
SWI_ban_rothschilds_desc:0 "By prioritizing domestic institutions and restricting external control, Switzerland can shield itself from volatile foreign interests. However, such measures risk damaging its reputation as a global financial hub and may provoke backlash from international partners."
SWI_free_trade:0 "Lighten Protectionis Policies"
SWI_free_trade_desc:0 "By carefully rolling back protectionist policies, we can restore trade relationships, encourage competition, and revitalize Swiss industry. A more open economy will attract foreign capital and reestablish Switzerland’s position as a key player in international finance and commerce."
SWI_foreign_investment:0 "Foreign Investments"
SWI_foreign_investment_desc:0 "Foreign banks and corporations are invited to reinvest in Swiss industry, infrastructure, and financial institutions. This influx of capital promises renewed economic dynamism and technological advancement, reinforcing Switzerland’s reputation as a stable and attractive financial hub."
SWI_invest_in_africia:0 "Invest In Africa"
SWI_invest_in_africia_desc:0 "Through banking initiatives, infrastructure loans, and commercial partnerships, Switzerland can extend its financial influence abroad. While the Confederation has no colonial ambitions, its capital can still shape economic development in key regions, securing access to resources and opening new trade channels for Swiss industry."
SWI_science_advancments:0 "Scientific Advancement Program"
SWI_science_advancments_desc:0 "This initiative prioritizes innovation in precision engineering, chemistry, and industrial efficiency—fields where Switzerland can maintain a competitive edge despite its limited natural resources. Close cooperation between private industry and academic institutions ensures that discoveries are rapidly applied to production and infrastructure."
SWI_infrascruture_devlopment:0 "Infrastructure  Devlopment"
SWI_infrascruture_devlopment_desc:0 "By improving transport efficiency between cantons and industrial centers, goods and resources can move more quickly and reliably, reducing regional disparities and boosting overall productivity. Strategic engineering projects, including alpine tunneling and hydroelectric expansion, further enhance Switzerland’s self-sufficiency and industrial capacity."
SWI_no_more_gold_standard:0 "No More Gold Standard"
SWI_no_more_gold_standard_desc:0 "By severing the franc’s strict link to gold, Switzerland gains the flexibility to adjust monetary policy, stabilize prices, and increase liquidity within the economy. This shift allows for more responsive fiscal planning and improved support for industry, banking, and employment."
SWI_restart_the_factories:0 "Restart The Factories"
SWI_restart_the_factories_desc:0 "State-backed incentives, credit support, and emergency contracts are used to bring factories back online. Priority is given to key sectors such as machinery, textiles, and precision manufacturing, ensuring that Switzerland’s industrial base recovers quickly and efficiently."
SWI_exspand_western_land:0 "Exspand Western Land"
SWI_exspand_western_land_desc:0 "To strengthen national cohesion and improve economic efficiency, the Federal Council initiates a development program focused on Switzerland’s western regions. Historically underdeveloped in comparison to industrial centers, these areas are now targeted for infrastructure expansion, industrial investment, and administrative integration."
SWI_exspand_eastern_land:0 "Exspand Eastern Land"
SWI_exspand_eastern_land_desc:0 "A federal development initiative is launched to improve transport links, expand infrastructure, and encourage industrial settlement in the east. New rail corridors and road networks integrate remote valleys into the national supply system, while incentives are offered to establish factories and workshops in underdeveloped regions."
SWI_western_mines:0 "Western Mines"
SWI_western_mines_desc:0 "State-supported enterprises and private contractors are encouraged to develop new extraction sites and modernize existing facilities. Improved infrastructure and investment in heavy machinery increase output efficiency, turning the western cantons into a key supplier of domestic industry."
SWI_eastern_refineries:0 "Eastern Refineries"
SWI_eastern_refineries_desc:0 "New state-supported refineries and industrial plants are constructed to convert imported raw resources into usable industrial inputs such as refined metals and processed materials. This improves efficiency across the national production chain and reduces bottlenecks in manufacturing."
SWI_devalue_swi_franc:0 "Devalue Swiss Franc"
SWI_devalue_swi_franc_desc:0 "To restore competitiveness, the Federal Council considers a controlled devaluation of the franc. By lowering its external value, Swiss goods become more attractive on global markets, boosting exports and revitalizing struggling industries. This measure also increases liquidity within the domestic economy, encouraging investment and employment."
SWI_high_quality_production:0 "High-Quality Production Standards"
SWI_high_quality_production_desc:0 "Factories are modernized to prioritize efficiency, durability, and precision manufacturing—particularly in machinery, tools, chemicals, and specialized industrial equipment. This policy strengthens Switzerland’s niche as a producer of high-value, export-grade goods that command premium prices on international markets."
SWI_new_factories:0 "New Factory Construction Initiative"
SWI_new_factories_desc:0 "New production facilities are established to strengthen both civilian and military industries, reducing unemployment and increasing national output capacity. Special emphasis is placed on precision manufacturing, machinery, and resource-processing industries to ensure long-term economic resilience."
SWI_create_jobs:0 "National Employment Program"
SWI_create_jobs_desc:0 "Public works projects, industrial expansion, and state-supported private sector incentives are introduced to rapidly generate employment opportunities. Infrastructure development, factory staffing programs, and regional investment schemes ensure that idle labor is redirected into productive economic activity."
SWI_fort_line:0 "Alpine Fortress Line"
SWI_fort_line_desc:0 "Strategic mountain passes, tunnels, and valleys are fortified with bunkers, artillery positions, and supply depots designed to delay or deter any potential invasion force. The rugged terrain of Switzerland becomes a defensive advantage, turning the nation into a deeply entrenched stronghold capable of prolonged resistance."
SWI_plan_the_new_eco:0 "Plan The New Economy"
SWI_plan_the_new_eco_desc:0 "Economic planners work alongside banks, universities, and industrial leaders to map out future production needs, infrastructure priorities, and labor distribution. This coordinated approach aims to balance efficiency with stability, ensuring that growth is both sustainable and resilient against future global shocks."
SWI_new_eco:0 "Plan The New Economy"
SWI_new_eco_desc:0 "With the global order destabilized in the aftermath of the Great Depression, Switzerland begins a comprehensive reassessment of its economic structure. Rather than relying solely on reactive policies, the Federal Council initiates a long-term national planning effort to modernize industry, stabilize finance, and coordinate development across all cantons."
SWI_prepare_for_war:0 "Prepare for National Defense"
SWI_prepare_for_war_desc:0 "The Federal Council authorizes expanded military training, mobilization planning, and stockpiling of essential supplies. Recruitment efforts are intensified, and coordination between cantonal militias and federal command structures is improved. Defensive doctrine is refined to maximize Switzerland’s natural advantage in mountainous terrain."
SWI_make_new_cities:0 "Found New Urban Centers"
SWI_make_new_cities_desc:0 "New towns and planned urban centers are established in strategically selected cantons, designed around modern infrastructure, efficient transport links, and proximity to industrial zones. These developments integrate housing, industry, and public services to create self-sustaining economic hubs that can support long-term population and productivity growth."
SWI_create_new_railways:0 "National Railway Expansion Program"
SWI_create_new_railways_desc:0 "New rail lines are constructed to connect remote alpine regions with major industrial and urban centers, while existing routes are upgraded for higher capacity and speed. Tunnel systems through mountainous terrain are expanded, improving year-round reliability and reducing logistical bottlenecks. This integrated network ensures that goods, resources, and labor can move efficiently across the Confederation."
SWI_railway_exspansion:0 "National Railway Expansion Program"
SWI_railway_exspansion_desc:0 "In response to the economic disruption caused by the Great Depression, Switzerland prioritizes the modernization and expansion of its railway network to strengthen internal trade and industrial mobility."
SWI_airforce:0 "The Swiss Air Force"
SWI_airforce_desc:0 "Though our mountains have long served as our shield, the age of modern warfare has taken to the skies. If Switzerland is to preserve its sovereignty, we must ensure that any who dare violate our airspace are met with swift and decisive resistance. A capable air force will turn our natural defenses into an impenetrable fortress."
SWI_airbase_creation:0 "Expand Air Base Infrastructure"
SWI_airbase_creation_desc:0 "A modern air force cannot function without proper infrastructure. By constructing and expanding air bases across our territory, we ensure rapid deployment, efficient logistics, and the ability to respond swiftly to any threat from above."
SWI_foreign_training:0 "Foreign Training Programs"
SWI_foreign_training_desc:0 "While Switzerland values its neutrality, there is much to learn from the military expertise of foreign powers. By sending our officers and pilots abroad, we can study modern tactics and bring valuable knowledge back home to strengthen our defenses."
SWI_bomber_creation:0 "Develop a Bomber Force"
SWI_bomber_creation_desc:0 "Control of the skies is not enough—we must also be capable of striking back. By investing in the development of bomber aircraft, we ensure that any threat to Switzerland can be met with a decisive and far-reaching response."
SWI_fighter_devlopment:0 "Fighter Development"
SWI_fighter_devlopment_desc:0 "To secure our skies, we must invest in the development of modern fighter aircraft. Fast, agile, and well-armed planes will allow us to intercept enemy bombers and maintain control over Swiss airspace."
SWI_escort_effort:0 "Escort Effort"
SWI_escort_effort_desc:0 "Long-range operations and bombing missions are only as effective as their protection. By investing in dedicated escort tactics and aircraft, we ensure our forces can operate safely even in contested airspace."
SWI_cas_effort:0 "Close Air Support Effort"
SWI_cas_effort_desc:0 "Air power is most effective when directly supporting troops on the ground. By focusing on close air support aircraft and tactics, we can deliver precise and devastating strikes against enemy forces engaged in combat."
SWI_the_future_of_the_country:0 "The Future of the Country"
SWI_the_future_of_the_country_desc:0 "Switzerland stands at a crossroads in a rapidly changing world. Whether through neutrality, reform, or decisive modernization, the path we choose today will determine the survival and strength of our nation for generations to come."
SWI_end_the_neutrality:0 "End the Neutrality"
SWI_end_the_neutrality_desc:0 "For centuries, neutrality has defined our nation, but the world is changing too rapidly for passive survival. To secure our future, Switzerland must abandon its traditional stance and actively engage in global affairs—by diplomacy, deterrence, or force if necessary."

 # ======================================================
 # NEW LOCALIZATIONS - Added for unlocalized focuses
 # ======================================================

 SWI_a_empty_thrown:0 "An Empty Throne"
 SWI_a_empty_thrown_desc:0 "With the old order swept away, Switzerland stands without a monarch. The question of who should sit upon the throne—if anyone—now becomes a matter of urgent political debate. Factions across the country rally behind different candidates, each promising a distinct vision for the Confederation's monarchical future."

 SWI_a_new_guards_corps:0 "Establish a New Guards Corps"
 SWI_a_new_guards_corps_desc:0 "To protect the new Prussian-aligned monarchy and ensure internal order, a dedicated royal guards corps is established. Drawing from the most loyal officers and soldiers, this elite force will serve as both a ceremonial institution and a capable security apparatus, defending the Crown against internal dissent and foreign intrigue."

 SWI_agarian_reform:0 "Agrarian Reform"
 SWI_agarian_reform_desc:0 "Land redistribution policies are introduced to restructure agricultural ownership, breaking up large estates and providing smaller farmers with greater independence. By improving yields and increasing rural productivity, the government seeks to build a more equitable foundation for the country's long-term economic health."

 SWI_agricultural_reform:0 "Agricultural Reform Program"
 SWI_agricultural_reform_desc:0 "The Federal Council introduces sweeping agricultural reforms to modernize farming practices and redistribute land resources. Collectivization efforts, combined with new equipment subsidies and technical education, aim to raise productivity and ensure food security for the Confederation."

 SWI_arm_workers:0 "Arm the Workers"
 SWI_arm_workers_desc:0 "To defend the revolution against reactionary forces, the worker councils vote to distribute weapons to trusted union members and factory workers. This people's militia will serve as the backbone of the new social order, ensuring that the gains of the revolution cannot be reversed by the old elites."

 SWI_ban_comunism:0 "Ban Communism"
 SWI_ban_comunism_desc:0 "To safeguard Christian democracy and the social order, the government moves to outlaw communist organizations and suppress radical left-wing agitation. Political education programs and law enforcement crackdowns ensure that Marxist ideology cannot gain a foothold in Swiss civil society."

 SWI_ban_fascist:0 "Ban the Fascists"
 SWI_ban_fascist_desc:0 "The new monarchist government moves swiftly to outlaw fascist organizations and suppress nationalist extremists who threaten the restored order. Through legislation and police action, the Crown ensures that no rival ideology can challenge its legitimacy or incite political violence."

 SWI_ban_trade_unions:0 "Ban Trade Unions"
 SWI_ban_trade_unions_desc:0 "The new government moves to dissolve independent labor organizations, viewing them as centers of subversion and socialist agitation. State-sanctioned corporatist bodies will replace the old unions, ensuring that workers remain represented within the new political framework without threatening social order."

 SWI_bastion_of_neutrality:0 "Bastion of Neutrality"
 SWI_bastion_of_neutrality_desc:0 "Switzerland has fully transformed itself into an impregnable fortress of permanent neutrality. Its borders are guarded by loyal militia, its mountain passes fortified beyond approach, and its citizens prepared for a fight to the last. No foreign power will dare violate Swiss sovereignty."

 SWI_begin_the_new_legislatiion_process:0 "Begin the New Legislative Process"
 SWI_begin_the_new_legislatiion_process_desc:0 "The Christian Democratic government initiates a comprehensive review of Swiss law, with the aim of aligning legal codes with Christian social teaching and democratic values. A new legislative commission is established to draft reforms spanning civil rights, labor law, and public morality."

 SWI_blessing_of_the_church:0 "Blessing of the Church"
 SWI_blessing_of_the_church_desc:0 "The new Napoleonic monarchy seeks the formal blessing of the Roman Catholic Church to legitimize its rule and inspire loyalty among the faithful. After lengthy negotiations, a concordat is reached, granting the Church certain privileges in exchange for its public support of the new regime."

 SWI_capture_wepons:0 "Capture Enemy Weapons"
 SWI_capture_wepons_desc:0 "As Swiss forces engage in combat, systematic efforts are made to recover and repurpose enemy weapons and equipment. Field workshops are established to repair and adapt captured materiel for Swiss use, supplementing the army's existing inventory and reducing dependency on costly new production."

 SWI_christian_democracy:0 "Christian Democratic Government"
 SWI_christian_democracy_desc:0 "The Christian Democratic movement rises to dominance, proposing a new political order rooted in faith, community, and democratic values. Breaking from both liberal capitalism and socialist radicalism, it offers a third path—guided by Church teachings—to restore stability and social cohesion to the Confederation."

 SWI_controll_over_french_lands:0 "Control Over French-Speaking Lands"
 SWI_controll_over_french_lands_desc:0 "The German-dominated government moves to assert firmer administrative control over Switzerland's French-speaking cantons. Political purges, language policies, and the appointment of loyal German-Swiss officials are used to integrate the Romand regions into the new national order."

 SWI_controll_over_voralberg:0 "Control Over Vorarlberg"
 SWI_controll_over_voralberg_desc:0 "Vorarlberg, historically tied to the Alemannic world, is brought under Swiss administrative influence. Diplomatic pressure and economic incentives are used to align the region with the new nationalist Swiss government, setting the stage for deeper political integration."

 SWI_create_mountain_guns:0 "Develop Mountain Artillery"
 SWI_create_mountain_guns_desc:0 "Specialized lightweight artillery pieces are developed and produced for use in alpine terrain where conventional guns cannot be deployed. These mountain guns can be broken down and carried by pack animals or infantry teams, providing Swiss forces with mobile fire support across their most important defensive ground."

 SWI_dual_dictator:0 "Establish a Dual Dictatorship"
 SWI_dual_dictator_desc:0 "Two powerful leaders emerge to jointly govern the new fascist Switzerland—one commanding the political apparatus, the other the military. This arrangement is intended to balance power and prevent the rise of a single autocrat, though in practice it creates constant tension and rivalry at the top of the state."

 SWI_elimante_eniemes:0 "Eliminate Enemies of the Crown"
 SWI_elimante_eniemes_desc:0 "The Prussian monarchy moves against its political enemies—liberals, socialists, and foreign agents—through a combination of arrests, exile, and targeted suppression. A purged judiciary ensures that the Crown's opponents have no legal recourse, consolidating monarchist power over the state."

 SWI_elite_training:0 "Elite Combat Training Program"
 SWI_elite_training_desc:0 "Hand-picked units from across the army are subjected to an intensive training regimen, combining advanced tactics, physical conditioning, and ideological indoctrination. These elite formations will serve as shock troops and personal guard units for the new regime, capable of operations the regular army cannot perform."

 SWI_emil_nietlispach_plan:0 "The Nietlispach Plan"
 SWI_emil_nietlispach_plan_desc:0 "Economic advisor Emil Nietlispach presents a comprehensive recovery program that combines agricultural modernization, infrastructure investment, and health reform. Backed by the Federal Council, the plan aims to strengthen Switzerland's social fabric and lay the groundwork for long-term prosperity under Christian Democratic governance."

 SWI_enlightment_ideas:0 "Enlightenment Ideas"
 SWI_enlightment_ideas_desc:0 "Drawing on Switzerland's long tradition of intellectual openness, the government promotes Enlightenment values of reason, individual liberty, and scientific progress. Cultural institutions are funded, universities expanded, and public education reformed to foster a citizenry capable of participating in modern democratic life."

 SWI_establish_bern_ss:0 "Establish the Bern SS"
 SWI_establish_bern_ss_desc:0 "Modeled on the German SS, a Swiss paramilitary organization is founded in Bern to serve as the enforcement arm of the fascist state. Rigorously selected and ideologically trained, its members are tasked with rooting out internal opposition, protecting leadership, and carrying out the regime's most sensitive operations."

 SWI_establish_camps:0 "Establish Internment Camps"
 SWI_establish_camps_desc:0 "To process and contain those deemed enemies of the new Germanic state, internment facilities are constructed in remote Swiss valleys. Political opponents, ethnic minorities, and foreign nationals are detained without trial under the pretext of national security, marking a dark turn in Switzerland's history."

 SWI_every_citzen_a_escape:0 "Every Citizen a Soldier"
 SWI_every_citzen_a_escape_desc:0 "The tradition of universal military service is reinforced and expanded. Every able-bodied citizen receives basic training, a personal weapon, and instructions for emergency mobilization. Even in the event of occupation, Switzerland's population would form a formidable resistance force, making any invasion a costly and prolonged endeavor."

 SWI_expand_the_ss:0 "Expand the SS"
 SWI_expand_the_ss_desc:0 "The Bern SS is expanded in numbers, equipment, and authority. New training facilities are constructed, recruitment intensified, and the organization's mandate broadened to include border security and the administration of the internment camp network."

 SWI_exspand_social_welfare:0 "Expand Social Welfare"
 SWI_exspand_social_welfare_desc:0 "The workers' government implements sweeping social welfare reforms, establishing universal healthcare, expanded pension schemes, and state-funded housing programs. These measures are intended to demonstrate the tangible benefits of the new order and secure popular loyalty among the working class."

 SWI_farmers_join_forces:0 "Farmers Join the Revolution"
 SWI_farmers_join_forces_desc:0 "Rural communities, long neglected by the urban elite, are brought into the revolutionary movement through a dedicated outreach program. Promises of land reform, debt relief, and collective farming infrastructure win the support of Switzerland's agricultural workers, expanding the revolutionary coalition beyond the factory floor."

 SWI_fascist_seize_bern:0 "Fascists Seize Bern"
 SWI_fascist_seize_bern_desc:0 "In a swift and well-coordinated operation, fascist paramilitary forces seize control of the Swiss capital. Government buildings, communication networks, and key infrastructure are occupied, and the Federal Council is dissolved. Switzerland's democratic era has come to an abrupt and violent end."

 SWI_form_the_old_guard_of_the_air:0 "Form the Old Guard of the Air"
 SWI_form_the_old_guard_of_the_air_desc:0 "Napoleon's Old Guard were the finest soldiers in France — elite, unbreakable and utterly devoted to their Emperor. We shall forge their spiritual successors in the skies above us, an air corps of hand-picked pilots trained to the highest standard, the Emperor's own wing."

 SWI_fortify_the_goverment:0 "Fortify the Government"
 SWI_fortify_the_goverment_desc:0 "The Federal Council takes measures to strengthen institutional stability and protect the government from internal subversion. Emergency legislation, enhanced intelligence gathering, and loyalty reviews within the civil service ensure that the state apparatus remains firmly in democratic hands."

 SWI_freedom_of_religon:0 "Guarantee Freedom of Religion"
 SWI_freedom_of_religon_desc:0 "The new Christian Democratic government reaffirms the separation of church and state, enshrining in law the right of every Swiss citizen to practice their faith freely. This guarantee of religious pluralism strengthens civil society and earns the government broad support from Switzerland's diverse Protestant and Catholic communities."

 SWI_french_king:0 "A French King"
 SWI_french_king_desc:0 "The monarchist government looks to France for a suitable candidate to ascend the Swiss throne. Historical ties between the French-speaking cantons and France make this a natural choice for many Romand citizens, though German-Swiss conservatives view the prospect with deep suspicion."

 SWI_german_advisors:0 "German Military Advisors"
 SWI_german_advisors_desc:0 "A delegation of Wehrmacht officers arrives in Switzerland to assist with the modernization of fascist Swiss forces. Their expertise in combined arms warfare, motorized operations, and siege tactics accelerates the development of the new army's operational doctrine."

 l_english:
 SWI_elite_air_in_honor_of_napoleon:0 "Eagles of Napoleon"
 SWI_elite_air_in_honor_of_napoleon_desc:0 "Napoleon's banner bore the Eagle — symbol of Imperial power and martial glory. Our finest pilots shall carry that same symbol into the skies, an elite air corps forged in the Emperor's honour, feared by all who dare challenge French supremacy in the air."

 SWI_short_man_no_more:0 "The Emperor Stands Tall"
 SWI_short_man_no_more_desc:0 "History's detractors mocked Napoleon for his stature, yet no man cast a longer shadow across the world. We shall put that slander to rest once and for all — the Emperor's legacy towers over his critics, and so too shall our new France."

 SWI_venerate_napoleon:0 "Venerate the Emperor"
 SWI_venerate_napoleon_desc:0 "Napoleon Bonaparte is not merely a historical figure — he is the soul of France made manifest. We shall elevate him to the status he deserves, enshrining his memory in law, culture and faith so that every Frenchman knows the greatness they are heir to."

 SWI_napoleon_portrait_found:0 "The Lost Portrait"
 SWI_napoleon_portrait_found_desc:0 "A remarkable discovery — a previously unknown portrait of the Emperor himself, recovered from the vaults of a Swiss estate. Authenticated and unveiled to the public, it becomes an instant symbol of the Napoleonic revival sweeping our nation."

 SWI_german_brother_union:0 "Germanic Brotherhood Union"
 SWI_german_brother_union_desc:0 "The Prussian monarchy formalizes its ideological and political alignment with the German Reich through a brotherhood pact. Cultural exchanges, military cooperation, and economic agreements bind the two nations closer together, as Switzerland steps firmly into Germany's sphere of influence."

 SWI_german_east_africa_company:0 "German East Africa Company"
 SWI_german_east_africa_company_desc:0 "Inspired by the old colonial trading companies, a Swiss-German commercial enterprise is established to manage economic operations in German East Africa. Swiss capital and organizational expertise are combined with German colonial infrastructure to extract resources and open new markets."

 SWI_german_king:0 "A German King"
 SWI_german_king_desc:0 "The monarchist movement turns to Germany for a suitable candidate to rule over the new Swiss kingdom. A prince of the Hohenzollern line is considered, which would tie Switzerland firmly to German cultural and political orbit—a prospect that delights the nationalist movement but alarms Switzerland's French and Italian-speaking communities."

 SWI_german_minorities_take_power:0 "German Minorities Take Power"
 SWI_german_minorities_take_power_desc:0 "German-Swiss nationalist factions leverage the new fascist order to systematically displace Romand and Ticino leaders from positions of authority. A campaign of legal pressure, political appointments, and cultural suppression ensures that German-Swiss identity becomes the dominant force in Swiss political life."

 SWI_german_sientist:0 "German Scientists Program"
 SWI_german_sientist_desc:0 "German academics and research scientists, including those fleeing internal purges or seeking opportunities abroad, are recruited to Swiss institutions and military research programs. Their expertise accelerates development in fields ranging from rocketry to chemical engineering."

 SWI_glory_of_napoleon:0 "The Glory of Napoleon"
 SWI_glory_of_napoleon_desc:0 "The new Helvetic monarchy fully embraces its Napoleonic heritage, commissioning grand public works, military parades, and cultural propaganda to evoke the grandeur of the First French Empire. Citizens are reminded that Switzerland once stood at the heart of European power, and that it can do so again."

SWI_capture_guns:0 "Captured Equipment Utilization"
SWI_capture_guns_desc:0 "Weapons taken from our enemies need not go to waste. By refurbishing and integrating captured arms into our arsenal, we can quickly reinforce our forces and conserve valuable domestic resources."

 SWI_health_research:0 "National Health Research Initiative"
 SWI_health_research_desc:0 "Switzerland's strong tradition in medicine and the natural sciences is leveraged to launch a national health research program. Universities and hospitals receive increased funding, and collaboration between public institutions and private pharmaceutical firms accelerates advances in treatment, disease prevention, and public health infrastructure."

 SWI_heavy_water:0 "Heavy Water Program"
 SWI_heavy_water_desc:0 "Switzerland's advanced chemical industry is directed toward the production of heavy water—a critical material for experimental nuclear and rocket research. Working in secrecy, Swiss and German scientists collaborate to build a production facility capable of supplying these advanced research programs."

 SWI_hire_farmers:0 "Organize the Farmers"
 SWI_hire_farmers_desc:0 "The revolutionary government establishes a national farmers' organization to integrate rural workers into the new social order. Collective farms, state-backed cooperatives, and direct representation in worker councils give the agricultural community a political voice while ensuring food production is aligned with national planning goals."

 SWI_hire_worker_leaders:0 "Appoint Worker Leaders"
 SWI_hire_worker_leaders_desc:0 "Trusted labor organizers and union leaders are elevated into formal administrative roles within the new government. By institutionalizing worker representation, the regime strengthens its popular base and ensures that the interests of the laboring class are embedded in every level of state decision-making."

 SWI_infrascruture_projects:0 "National Infrastructure Projects"
 SWI_infrascruture_projects_desc:0 "Large-scale public works projects are launched across the Confederation, creating jobs while improving transport links, utilities, and civic infrastructure. Road construction, electrification programs, and alpine tunnel expansion are prioritized, building a modern foundation for long-term economic growth."

 SWI_isolate_borders:0 "Isolate the Borders"
 SWI_isolate_borders_desc:0 "Switzerland withdraws further from the international community, closing many border crossings and restricting the movement of goods and people. Heavy fortifications, constant patrols, and intelligence monitoring create an impenetrable perimeter, ensuring that the neutral republic cannot be compromised by outside influence or internal subversion."

SWI_german_tanks:0 "German Armor Cooperation"
SWI_german_tanks_desc:0 "Collaboration with German industry grants us access to modern tank designs and production methods. This partnership will significantly enhance the effectiveness of our armored divisions."

SWI_german_tanks_1:0 "German Armor Cooperation"
SWI_german_tanks_1_desc:0 "Collaboration with German industry grants us access to modern tank designs and production methods. This partnership will significantly enhance the effectiveness of our armored divisions."

 SWI_italian_king:0 "An Italian King"
 SWI_italian_king_desc:0 "The monarchist movement looks south to Italy for a royal candidate, proposing a member of the House of Savoy to ascend the Swiss throne. This choice would deepen cultural and political ties with Rome, though it risks inflaming tensions with Swiss Protestants and the German-speaking majority."

 SWI_italian_trade_pack:0 "Italian Trade Pact"
 SWI_italian_trade_pack_desc:0 "A comprehensive trade agreement is signed between Switzerland and Italy, opening new commercial channels for both nations. Swiss manufactured goods and financial services flow south, while Italian raw materials and agricultural products enter the Confederation, creating a mutually beneficial economic relationship."

SWI_german_mech:0 "German Mechanized Cooperation"
SWI_german_mech_desc:0 "Adopting German mechanized doctrine and vehicles allows us to modernize our forces at an accelerated pace. Our divisions will move faster, strike harder, and adapt better to the demands of modern warfare."

SWI_german_mech_1:0 "German Mechanized Cooperation"
SWI_german_mech_1_desc:0 "Adopting German mechanized doctrine and vehicles allows us to modernize our forces at an accelerated pace. Our divisions will move faster, strike harder, and adapt better to the demands of modern warfare."

 SWI_kick_out_non_germans:0 "Expel Non-Germans"
 SWI_kick_out_non_germans_desc:0 "In a dramatic demonstration of racial ideology, the fascist government enacts sweeping expulsion orders targeting non-Germanic populations. French, Italian, and Jewish residents face forced removal, property confiscation, and deportation, fundamentally transforming the Confederation's demographics."

 SWI_kick_out_the_old_officers:0 "Purge the Officer Corps"
 SWI_kick_out_the_old_officers_desc:0 "The fascist government purges senior military officers deemed insufficiently loyal or ideologically unreliable. New commanders, selected for their political alignment as much as their military competence, are elevated into leadership positions, reshaping the army into an instrument of the regime."

   SWI_prussian_army_legacy:0 "Legacy of the Prussian Army"
 SWI_prussian_army_legacy_desc:0 "No military tradition in the modern world rivals that of Prussia. Their iron discipline, legendary officer corps and unrelenting drive for battlefield excellence forged the finest army Europe has ever seen. We shall make that legacy our own."

 SWI_great_war_generals:0 "Veterans of the Great War"
 SWI_great_war_generals_desc:0 "The Great War produced a generation of battle-hardened German commanders who know better than anyone the brutal realities of modern warfare. We shall bring these veterans into our fold — their experience is worth more than any manual."

 SWI_study_history_war:0 "Study the History of War"
 SWI_study_history_war_desc:0 "From the campaigns of Frederick the Great to the trenches of the Western Front, military history is a treasure trove of hard-won lessons. Our officers shall study it thoroughly — understanding the past is the first step to mastering the future."

   SWI_roman_fleet_design:0 "Roman Fleet Design"
 SWI_roman_fleet_design_desc:0 "The great navies of ancient Rome were the backbone of Mediterranean dominance. We shall look to their designs and doctrines as inspiration for a modern Italian fleet worthy of the new Roman Empire."

 SWI_devlop_ship_building:0 "Develop Our Shipyards"
 SWI_devlop_ship_building_desc:0 "Italy's coastline is long and her ports are many, yet her shipyards lag behind the great naval powers. We shall invest heavily in expanding and modernising our shipbuilding capacity to bring the Roman fleet to life."

 SWI_roman_marines:0 "Legions of the Sea"
 SWI_roman_marines_desc:0 "Rome's power was not only in her ships but in the soldiers who fought from their decks. We shall raise dedicated marine units — warriors equally at home on land or sea — to carry the Eagle onto enemy shores."

 SWI_corvis_legacy:0 "Legacy of the Corvus"
 SWI_corvis_legacy_desc:0 "The corvus — Rome's ingenious naval boarding device — turned the tide of the First Punic War and made Roman sailors the terror of the Mediterranean. We shall honour that legacy by developing bold new boarding and assault doctrines for our fleet."

 SWI_leigons_of_caeser:0 "Legions of Caesar"
 SWI_leigons_of_caeser_desc:0 "The military reorganization draws inspiration from Julius Caesar's famously aggressive legions—prioritizing offensive capability, rapid maneuver, and shock tactics. These forces are designed not merely to defend Switzerland but to project power beyond its borders, in the spirit of Gaul's great conqueror."

 SWI_mech_devlopment:0 "Mechanized Forces Development"
 SWI_mech_devlopment_desc:0 "The fascist military command authorizes the creation of mechanized infantry formations, equipping soldiers with armored half-tracks and motorized transports. Combined with improved communication equipment, these units can keep pace with armored advances and deliver decisive force on the modern battlefield."

 SWI_mittelafrika_dream:0 "Mittelafrika Dream"
 SWI_mittelafrika_dream_desc:0 "Inspired by old German colonial ambitions, the Prussian-aligned monarchy envisions a future Swiss-German colonial empire in Central Africa—Mittelafrika. Diplomatic overtures, investments, and coordination with the German Reich begin the groundwork for reclaiming and expanding German colonial territories in Africa."

 SWI_monachist_seize_burn:0 "Monarchists Seize Bern"
 SWI_monachist_seize_burn_desc:0 "In a swift coup supported by the nationalist movement, monarchist forces seize the Swiss capital and dissolve the Federal Council. The banner of a restored monarchy is raised over the Bundeshaus, and the new government declares that Switzerland's republican experiment has ended—a king will once again lead the Confederation."

 SWI_napolonic_code:0 "Adopt the Napoleonic Code"
 SWI_napolonic_code_desc:0 "To modernize Switzerland's legal system and solidify its alignment with French revolutionary heritage, the Napoleonic Code is adopted as the foundation of civil law. This sweeping legal reform standardizes contracts, property rights, and civil liberties across all cantons, replacing the patchwork of cantonal laws with a unified national framework."

 SWI_nationalist_goverment:0 "Nationalist Government"
 SWI_nationalist_goverment_desc:0 "A nationalist faction seizes control of the Swiss state, promising to restore national pride, purge foreign influences, and build a strong, unified Switzerland. Democratic institutions are suspended, opposition parties outlawed, and a new government of nationalist ideologues takes office, charting a radical new course for the Confederation."

 SWI_netrality_forever:0 "Neutrality Forever"
 SWI_netrality_forever_desc:0 "Switzerland reaffirms its centuries-old commitment to armed neutrality as a sacred national principle. The Federal Council declares that no foreign entanglement, alliance, or war will compromise Switzerland's independence, and invests heavily in the military and civil infrastructure needed to defend that neutrality indefinitely."

 SWI_new_prussian_kingdom:0 "The New Prussian Kingdom"
 SWI_new_prussian_kingdom_desc:0 "The German-aligned monarchy consolidates its rule, drawing heavily on Prussian administrative and military traditions. A reformed bureaucracy, a modernized army built on Prussian discipline, and close cultural ties with Germany define the new Swiss state as a junior partner of the German Reich."

 SWI_old_guns:0 "Old Guns, New Purpose"
 SWI_old_guns_desc:0 "Switzerland's warehouses contain vast quantities of older weapons from previous mobilizations—some outdated, but many still serviceable. These are inspected, repaired, and redistributed to newly formed units, providing a cost-effective way to arm the expanding fascist military without waiting for new production."

 SWI_perfect_the_republic:0 "Perfect the Republic"
 SWI_perfect_the_republic_desc:0 "The Federal Council undertakes a comprehensive program of democratic reform, strengthening institutions, improving transparency, and expanding civic participation. Cantonal cooperation is enhanced, the federal bureaucracy modernized, and public trust in government reinforced, ensuring that Switzerland's republic emerges from the turbulent 1930s stronger than ever."

 SWI_print_new_roman_coins:0 "Print New Roman Coins"
 SWI_print_new_roman_coins_desc:0 "To cement the Helvetic Roman identity of the new monarchy, a new national currency is introduced bearing Roman-inspired imagery—eagles, laurels, and the profiles of the new rulers. This symbolic act of economic sovereignty reinforces the monarchy's ideological legitimacy and its break from the old Swiss republican order."

 SWI_raise_militia:0 "Raise the Militia"
 SWI_raise_militia_desc:0 "The traditional Swiss militia system is called upon again, with cantons mobilizing their reserve forces to reinforce the regular army. Citizens with military training report to their designated assembly points, bringing their personal weapons and equipment, rapidly expanding Switzerland's defensive capacity without the cost of maintaining a large standing army."

 SWI_reach_out_to_the_pope:0 "Reach Out to the Pope"
 SWI_reach_out_to_the_pope_desc:0 "The Christian Democratic government opens diplomatic channels with the Vatican, seeking the blessing and political support of the Holy Father. A formal envoy is dispatched to Rome with proposals for a concordat, promising the Church a respected role in Swiss public life in exchange for its moral authority behind the new government."

 SWI_recruit_militia_officers:0 "Recruit Militia Officers"
 SWI_recruit_militia_officers_desc:0 "Experienced officers from the cantonal militias are recruited into a new professional reserve officer corps, receiving advanced training and modern equipment. This investment in leadership quality ensures that, when the militia is called to arms, its units are led by capable, well-prepared commanders."

 SWI_repopulation_program:0 "Repopulation Program"
 SWI_repopulation_program_desc:0 "Following the mass expulsion of non-Germanic residents, the fascist government launches a program to repopulate the emptied regions with ethnic German settlers. Financial incentives, housing grants, and land allocations attract settlers from across the German-speaking world, reshaping the demographic landscape of the Confederation."

 SWI_rockets:0 "Rocket Research Program"
 SWI_rockets_desc:0 "Drawing on the expertise of German scientists and captured research materials, Switzerland launches a secret rocket development program. Early experiments focus on artillery rockets and barrage weapons, but longer-term ambitions point toward more advanced ballistic technology that could transform Swiss military capabilities."

 SWI_roman_helvetia:0 "Roman Helvetia"
 SWI_roman_helvetia_desc:0 "The Italian king's accession inspires a cultural renaissance drawing on Helvetia's ancient Roman past. Public monuments, state symbols, and civic institutions are redesigned to evoke the Roman province of Helvetia, blending Swiss patriotism with Italian cultural heritage to forge a new national identity for the monarchy."

 SWI_spiritual_defense_of_the_nation:0 "Spiritual Defense of the Nation"
 SWI_spiritual_defense_of_the_nation_desc:0 "Drawing on the concept of Geistige Landesverteidigung, the Christian Democratic government launches a program to defend Switzerland's cultural and spiritual identity against foreign ideologies. Through education, media, and Church partnerships, citizens are encouraged to embrace the values of community, faith, and democratic freedom as the true Swiss way of life."

 SWI_ss_take_power:0 "SS Takes Power"
 SWI_ss_take_power_desc:0 "The Bern SS outmaneuvers its rivals within the fascist movement, seizing control of the security apparatus and placing its own men in key government positions. Switzerland's fascist state now has a distinctly Himmler-esque character, with ideology and terror serving as the twin pillars of governance."

 SWI_stablize_the_country:0 "Stabilize the Country"
 SWI_stablize_the_country_desc:0 "After years of economic depression and political turmoil, the Federal Council launches a comprehensive national stabilization program. Emergency measures address unemployment, reinforce public institutions, and restore confidence in Switzerland's democratic government—creating the stable foundation needed to pursue a lasting policy of armed neutrality."

 SWI_state_religon:0 "Establish a State Religion"
 SWI_state_religon_desc:0 "After debate within the Federal Council, Catholicism is designated as the state religion of Switzerland, with the Church assuming an official role in public life. While Protestant cantons protest this move, the government argues that a unified spiritual foundation is necessary to reinforce national cohesion under the new Christian Democratic order."

 SWI_take_over_bundeshaus:0 "Take Over the Bundeshaus"
 SWI_take_over_bundeshaus_desc:0 "Worker militias and revolutionary councils converge on Bern and seize the Bundeshaus, Switzerland's seat of federal government. The old Federal Council is dissolved, and a new revolutionary government is proclaimed. The working class has taken power—now the difficult work of building a new social order begins."

 SWI_take_over_econemy:0 "Take Over the Economy"
 SWI_take_over_econemy_desc:0 "The new workers' government moves to nationalize key industries, banks, and utilities. Factory management is transferred to workers' councils, and central planning begins to replace the market economy. Switzerland's famous industrial expertise is now directed toward the collective good rather than private profit."

 SWI_tank_training:0 "Tank Warfare Training Program"
 SWI_tank_training_desc:0 "Swiss officers are sent to observe German armored exercises, and domestic training programs are established to prepare crews for combined arms warfare. Although Switzerland's terrain is not ideal for large armored formations, well-trained tank crews give the military a credible offensive option and valuable defensive capability."

 SWI_time_of_helvetic_republic:0 "Time of the Helvetic Republic"
 SWI_time_of_helvetic_republic_desc:0 "The French king's arrival revives memories of the Helvetic Republic—the short-lived French client state imposed on Switzerland during the Napoleonic era. While controversial, this history provides a cultural template for aligning Switzerland with France, and the new government draws on it to legitimize its political and legal reforms."

 SWI_trade_unions:0 "Establish Revolutionary Trade Unions"
 SWI_trade_unions_desc:0 "The workers' government formally establishes a national system of revolutionary trade unions to represent labor across every industry. Unlike the old unions that existed to negotiate within the capitalist system, these organizations are instruments of worker power within the new socialist state, shaping production decisions and holding managers accountable."

 SWI_women_rights:0 "Women's Rights"
 SWI_women_rights_desc:0 "The workers' government passes landmark legislation guaranteeing equal rights for women in the workplace, before the law, and in political life. Universal suffrage is extended to women for the first time in Swiss history—a historic step that strengthens the revolutionary coalition and sets Switzerland apart as a model of social progress."

 SWI_wonder_wepons:0 "Wunderwaffe Program"
 SWI_wonder_wepons_desc:0 "Inspired by German secret weapons research, Switzerland's fascist government launches its own Wunderwaffe initiative, directing resources toward advanced military technology that could change the balance of war. Rockets, heavy water experiments, and exotic propulsion systems are explored in secrecy under the supervision of recruited German scientists."

 SWI_workers_seize_industry_plants:0 "Workers Seize the Factories"
 SWI_workers_seize_industry_plants_desc:0 "Galvanized by revolutionary fervor, organized workers occupy Switzerland's factories, mines, and industrial facilities. Management is expelled, and worker councils take over production decisions. This seizure of the means of production marks the decisive moment of the Swiss socialist revolution—the point of no return."
 SWI_army_on_the_move:0 "Army on the Move"
 SWI_army_on_the_move_desc:0 "Modern warfare demands speed and flexibility. By improving mobility across all branches of the army, we ensure our forces can respond rapidly to threats and exploit opportunities wherever they arise."
 SWI_mobile_army_adaption:0 "Adapt to Mobile Warfare"
 SWI_mobile_army_adaption_desc:0 "Rigid formations and slow responses will lead only to defeat. Embracing mobile warfare doctrines will allow our forces to maneuver efficiently, respond quickly, and maintain the initiative in any conflict."
 SWI_special_forces:0 "Elite Mountain Troops"
 SWI_special_forces_desc:0 "Our terrain demands soldiers of exceptional skill and endurance. By developing specialized mountain units, we ensure our forces can outmaneuver and outfight any enemy in the harsh Alpine environment."
 SWI_spiritual_defense:0 "Spiritual Defense"
 SWI_spiritual_defense_desc:0 "The strength of a nation lies not only in its weapons, but in the resolve of its people. By fostering unity, morale, and a shared sense of purpose, we ensure that our soldiers and citizens alike stand firm in the face of any threat."
 SWI_land_reform:0 "Agrarian Reforms"
 SWI_land_reform_desc:0 "By modernizing land distribution and farming practices, we can increase productivity and ensure that our nation remains self-sufficient even under the pressures of war."
 SWI_reach_out_to_the_pope_idea:0 "Reach Out to the Pope"
 SWI_reach_out_to_the_pope_idea_desc:0 "By establishing closer ties with the Holy See, we seek moral guidance and international legitimacy. Strengthening relations with the Pope may bolster national unity and reinforce our position in a divided world."

 SWI_import_ss_officers:0 "Import SS Officers"
 SWI_import_ss_officers_desc:0 "The SS has produced some of the finest officers in the world. We shall bring them to Switzerland to train and lead our own forces."

 SWI_aryan_army:0 "An Aryan Army"
 SWI_aryan_army_desc:0 "With SS officers now embedded in our military, we can begin reshaping our armed forces along National Socialist ideals — disciplined, racially pure, and ideologically committed."

 SWI_swiss_aryan_school_for_young_soliders_and_officers:0 "Swiss Aryan Military Academy"
 SWI_swiss_aryan_school_for_young_soliders_and_officers_desc:0 "We shall establish a dedicated academy to train the next generation of Swiss soldiers and officers in the spirit of Aryan discipline and National Socialist doctrine."

 SWI_recruit_in_german_comunities:0 "Recruit in German Communities"
 SWI_recruit_in_german_comunities_desc:0 "Switzerland's German-speaking communities are a natural recruiting ground for ideologically aligned volunteers. We will tap into these populations to swell our ranks."

 SWI_import_ss_films:0 "Import SS Propaganda Films"
 SWI_import_ss_films_desc:0 "German propaganda films have proven remarkably effective at inspiring loyalty and ideological fervour. We shall import and screen them across Switzerland."

 SWI_move_to_swiss_movie:0 "A Swiss Propaganda Industry"
 SWI_move_to_swiss_movie_desc:0 "Relying on German films is a start, but Switzerland must produce its own propaganda. We will establish a domestic film industry to spread our message to every household."

  SWI_Bert_Eriksson:0 "Bert Eriksson"
 SWI_Bert_Eriksson_desc:0 "A devoted Swiss National Socialist, Eriksson has spent years cultivating ties with the SS leadership in Berlin. His connections abroad make him an invaluable asset to our cause."

 SWI_Sepp_Dietrich:0 "Sepp Dietrich"
 SWI_Sepp_Dietrich_desc:0 "A hardened veteran of the Great War and one of the most decorated commanders in the Waffen-SS, Dietrich's battlefield experience and personal loyalty to the Führer are beyond question."

 SWI_Leon_Gaultier:0 "Léon Gaultier"
 SWI_Leon_Gaultier_desc:0 "A French-born volunteer of the Waffen-SS, Gaultier proved his commitment to the pan-European National Socialist vision on the Eastern Front. He now brings that experience to Switzerland."

 SWI_Otto_Skorzeny:0 "Otto Skorzeny"
 SWI_Otto_Skorzeny_desc:0 "The most daring commando in the Reich, Skorzeny is infamous for his audacious rescue of Mussolini. His skills in unconventional warfare are unmatched in the world."

 SWI_Fritz_Klingenberg:0 "Fritz Klingenberg"
 SWI_Fritz_Klingenberg_desc:0 "Famous for capturing Belgrade with a handful of men, Klingenberg is a symbol of SS boldness and initiative. His exploits have made him a legend within the Waffen-SS."

 SWI_Leon_Degrelle:0 "Léon Degrelle"
 SWI_Leon_Degrelle_desc:0 "The charismatic Belgian leader of the Rexist movement and the Walloon SS volunteers, Degrelle is one of the most passionate advocates for a unified fascist Europe."

  SWI_bern_ss:0 "Bern SS"
  SWI_bern_ss_desc:0 "The establishment of an SS chapter in Bern has given Switzerland's National Socialist movement an organised and disciplined armed wing. Their presence in the capital sends a clear message — the new order has arrived."
  SWI_bern_ss_1:0 "Bern SS"
  SWI_bern_ss_1_desc:0 "The establishment of an SS chapter in Bern has given Switzerland's National Socialist movement an organised and disciplined armed wing. Their presence in the capital sends a clear message — the new order has arrived."

  SWI_film_of_war:0 "Films of War"
  SWI_film_of_war_desc:0 "Reels of German wartime footage and SS propaganda films now screen across Switzerland's cinemas and public halls. The images of victory, sacrifice and Aryan strength are slowly reshaping the Swiss public's view of the world around them."
  SWI_film_of_war_1:0 "Films of War"
  SWI_film_of_war_1_desc:0 "Reels of German wartime footage and SS propaganda films now screen across Switzerland's cinemas and public halls. The images of victory, sacrifice and Aryan strength are slowly reshaping the Swiss public's view of the world around them."

  reward_tt:0 "You will see the reward after doing previous focus"

  SWI_aryan_army_idea:0 "Aryan Army"
  SWI_aryan_army_idea_desc:0 "Our armed forces have been purged and reshaped along National Socialist ideals. Racially pure, ideologically committed and drilled to SS standards, the Swiss military is no longer a mere defensive militia — it is the sword of a new order."
  SWI_aryan_army_idea_1:0 "Aryan Army"
  SWI_aryan_army_idea_1_desc:0 "Our armed forces have been purged and reshaped along National Socialist ideals. Racially pure, ideologically committed and drilled to SS standards, the Swiss military is no longer a mere defensive militia — it is the sword of a new order."
  SWI_aryan_army_idea_2:0 "Aryan Army"
  SWI_aryan_army_idea_2_desc:0 "Our armed forces have been purged and reshaped along National Socialist ideals. Racially pure, ideologically committed and drilled to SS standards, the Swiss military is no longer a mere defensive militia — it is the sword of a new order."

  SWI_talented_new_officers:0 "Talented New Officers"
  SWI_talented_new_officers_desc:0 "The SS academies have produced a new generation of Swiss officers — young, fanatical and capable. Trained in the finest National Socialist military tradition, these men are eager to prove themselves on the battlefield and lead Switzerland's army into a new era."

    SWI_officer_devlopment_idea:0 "Officer Development Program"
 SWI_officer_devlopment_idea_desc:0 "A new generation of Swiss officers is emerging from our military academies — sharp, disciplined and hungry to prove themselves. Rigorously trained in both classical military theory and the hard lessons of modern warfare, these men form the backbone of a revitalised Swiss Army."

  SWI_mandatory_army_service:0 "Mandatory Military Service"
 SWI_mandatory_army_service_desc:0 "Every able-bodied Swiss man now serves his time in the army. The barracks are full, the drilling grounds are busy and Swiss society has taken on a quietly martial character. When the call to arms comes, Switzerland will not be found wanting."

  SWI_camps:0 "Concentration Camps"
  SWI_camps_desc:0 "Camps have been erected across the Swiss countryside, hidden from the eyes of the outside world. Political dissidents, Jews, and enemies of the movement are quietly disappeared into their walls — fear now keeps the population in line."

  SWI_repopulation_program_idea:0 "Repopulation Program"
  SWI_repopulation_program_idea_desc:0 "The state has enacted a sweeping program to encourage Aryan birth rates across Switzerland. Financial incentives, state housing and social pressure push Swiss families to grow — the future belongs to those who populate it."

  SWI_fortify_goverment:0 "Fortify the Government"
  SWI_fortify_goverment_desc:0 "In uncertain times, internal stability is our greatest strength. By reinforcing our institutions and ensuring continuity of governance, we safeguard Switzerland’s neutrality against both internal unrest and external pressure."
  
  SWI_perfect_republic:0 "A Model Republic"
SWI_perfect_republic_desc:0 "By refining our democratic institutions and promoting unity among our people, we can build a state that stands as an example to the world—resilient, fair, and enduring."

SWI_militia_soldier:0 "Citizen Militia"
SWI_militia_soldier_desc:0 "Every citizen is a defender of the nation. A strong militia system allows us to field a capable force on short notice, rooted in discipline, local knowledge, and unwavering commitment to our homeland."

SWI_mountain_guns:0 "Mountain Artillery"
SWI_mountain_guns_desc:0 "Fighting in the Alps demands specialized equipment. By deploying lightweight and adaptable artillery designed for mountainous terrain, we ensure our forces can deliver effective firepower even in the most challenging environments."

SWI_isolate:0 "Isolationism"
SWI_isolate_desc:0 "Avoiding the struggles of other nations allows us to preserve our strength. By remaining isolated from global conflicts, we ensure our resources and attention remain focused on defending our homeland."

SWI_isolate_1:0 "Isolationism"
SWI_isolate_1_desc:0 "Avoiding the struggles of other nations allows us to preserve our strength. By remaining isolated from global conflicts, we ensure our resources and attention remain focused on defending our homeland."

SWI_isolate_2:0 "Isolationism"
SWI_isolate_2_desc:0 "Avoiding the struggles of other nations allows us to preserve our strength. By remaining isolated from global conflicts, we ensure our resources and attention remain focused on defending our homeland."

 SWI_immigration_wave:0 "Immigration Wave"
 SWI_immigration_wave_desc:0 "Refugees and migrants continue to arrive at our borders fleeing the turmoil spreading across Europe. Every fifty days another wave makes the crossing into Switzerland."

 SWI_limit_immigration:0 "Restrict Immigration"
 SWI_limit_immigration_desc:0 "We can slow the flow of refugees by tightening border controls and increasing documentation requirements. This will reduce incoming numbers but may ease pressure on our society."

 SWI_close_borders:0 "Close the Borders"
 SWI_close_borders_desc:0 "A total closure of Switzerland's borders will halt immigration entirely. Harsh but effective — those fleeing German expansion will have to look elsewhere."

 SWI_open_borders:0 "Open the Borders"
 SWI_open_borders_desc:0 "We shall reopen our borders and welcome those fleeing persecution and war. Switzerland has long been a refuge — we shall honour that tradition."

 SWI_lift_restrictions:0 "Lift Immigration Restrictions"
 SWI_lift_restrictions_desc:0 "The emergency restrictions on immigration are no longer necessary. We shall ease border controls and allow the flow of refugees to resume normally."

 # Ideas
 SWI_small_influx:0 "Small Refugee Influx"
 SWI_small_influx_desc:0 "A modest number of refugees have arrived in Switzerland, many of them skilled professionals and intellectuals fleeing persecution. Their contributions are quietly enriching our nation."

 SWI_growing_refugee_population:0 "Growing Refugee Population"
 SWI_growing_refugee_population_desc:0 "Tens of thousands of refugees now call Switzerland home. The strain on housing and public services is beginning to show, though many bring valuable skills with them."

 SWI_refugee_crisis:0 "Refugee Crisis"
 SWI_refugee_crisis_desc:0 "Switzerland is struggling under the weight of a massive refugee population. Public services are stretched, tensions are rising and the government faces growing pressure to act."

 SWI_overwhelmed_nation:0 "Overwhelmed Nation"
 SWI_overwhelmed_nation_desc:0 "Switzerland has been completely overwhelmed by the tide of refugees pouring across its borders. Society is fracturing under the strain and the government is losing control of the situation."

 # Events
 SWI_immigration.1.t:0 "Another Wave Arrives"
 SWI_immigration.1.d:0 "As conflict and oppression spread across Europe, more refugees have made the perilous journey to Switzerland. Our border towns are swelling with those who have lost everything."
 SWI_immigration.1.a:0 "We will do what we can."

 SWI_immigration.2.t:0 "Border Restrictions Imposed"
 SWI_immigration.2.d:0 "The government has announced tighter controls at the border. Refugees will face more stringent checks and many will be turned back. It is a hard but perhaps necessary measure."
 SWI_immigration.2.a:0 "Switzerland must look after its own first."

 SWI_immigration.3.t:0 "The Borders Are Closed"
 SWI_immigration.3.d:0 "Switzerland has sealed its borders entirely. No more refugees will be admitted. The decision is controversial but the government insists it is the only way to preserve social order."
 SWI_immigration.3.a:0 "It had to be done."

 SWI_immigration.4.t:0 "The Borders Reopen"
 SWI_immigration.4.d:0 "The government has reversed its closure policy and reopened Switzerland's borders to refugees once more. Aid organisations welcome the decision as thousands prepare to make the crossing."
 SWI_immigration.4.a:0 "Switzerland stands with the persecuted."

 SWI_immigration.5.t:0 "Restrictions Lifted"
 SWI_immigration.5.d:0 "The emergency restrictions on immigration have been lifted. Border controls return to normal and the flow of refugees into Switzerland resumes."
 SWI_immigration.5.a:0 "We open our arms once more."

 SWI_immigration_cat:0 "Immigration"
 SWI_immigration_cat_desc:0 "As war and persecution spread across Europe, Switzerland faces a growing tide of refugees at its borders. How we manage this crisis will shape the future of our nation."

 SWI_state_development_846:0 "State Development"
 SWI_state_development_151:0 "State Development"
 SWI_state_development_847:0 "State Development"
 SWI_state_development_845:0 "State Development"
 SWI_state_development_3:0 "State Development"

 SWI_rebuild_the_nation_cat:0 "State Development"

 SWI_great_depression_cat:0 "The Great Depression"
 SWI_great_depression_cat_desc:0 "The global economic collapse has brought Switzerland to its knees. Unemployment runs rampant, factories stand idle and the people grow restless. The government must find a way out of this crisis before it tears the nation apart."

 # Decisions
 SWI_devalue_franc:0 "Devalue the Swiss Franc"
 SWI_devalue_franc_desc:0 "The Swiss Franc has long been a symbol of stability and trust, but its strength is strangling our exports and deepening the depression. A controlled devaluation will make Swiss goods competitive again on the world market and breathe life back into our struggling industries."

 SWI_no_gold_standard:0 "Abandon the Gold Standard"
 SWI_no_gold_standard_desc:0 "Tying the Franc to gold has left our monetary policy in chains. By abandoning the gold standard we free the government to expand the money supply, stimulate spending and pull Switzerland out of the deflationary spiral that is crushing our economy."

 SWI_restart_factories:0 "Restart the Factories"
 SWI_restart_factories_desc:0 "Across Switzerland, factory floors that once hummed with activity now sit silent. With state subsidies and guaranteed contracts we can coax industry back to life — putting workers back on the floor and goods back on the shelves."

 SWI_protectionism_eco:0 "Economic Protectionism"
 SWI_protectionism_eco_desc:0 "Foreign goods flood our markets at prices our own producers cannot match. By raising tariffs and restricting imports we will shield Swiss industry from outside competition and ensure that what little money remains in the economy stays in Swiss hands."


 # Root
 SWI_army_of_swiss:0 "The Army of Switzerland"
 SWI_army_of_swiss_desc:0 "Switzerland may be small but she has never been defenceless. The time has come to take stock of our military and forge it into a force capable of defending our sovereignty against whatever storms may come."

 # Defense Branch
 SWI_defense_plan:0 "The Defense Plan"
 SWI_defense_plan_desc:0 "Switzerland's greatest strategic asset is her terrain. Our mountains and valleys form a natural fortress — we shall build our military doctrine around them, making any invasion of Switzerland a costly and bloody affair."

 SWI_study_defense_operations:0 "Study Defensive Operations"
 SWI_study_defense_operations_desc:0 "Our officers shall immerse themselves in the great defensive campaigns of military history. From the mountain passes of antiquity to the trenches of the Great War, there is much to learn about the art of holding ground."

 SWI_anti_tank_defense_advanments:0 "Anti-Tank Defences"
 SWI_anti_tank_defense_advanments_desc:0 "The tank has changed the face of modern warfare and no defensive doctrine can ignore it. We shall invest in anti-tank weapons, obstacles and tactics to ensure that no armoured thrust can break our lines."

 SWI_engineer_corps:0 "Alpine Special Forces"
 SWI_engineer_corps_desc:0 "Hidden in the peaks and forests of the Swiss Alps, our special forces units stand ready. Masters of ambush, sabotage and silent elimination, these elite soldiers are the unseen guardians of Switzerland — striking from the shadows before the enemy even knows they are there."

 SWI_super_heavy_howitzers_defense:0 "Super-Heavy Howitzers"
 SWI_super_heavy_howitzers_defense_desc:0 "Massed enemy formations attempting to push through our mountain passes will be met with the thunder of super-heavy artillery. These colossal guns, emplaced in fortified positions, will make any assault on Swiss soil an exercise in futility."

 SWI_infantry_defense:0 "Defensive Infantry Doctrine"
 SWI_infantry_defense_desc:0 "The Swiss infantryman has always been among the finest soldiers in Europe. We shall hone his skills in defensive fighting — ambush, fallback positions and the brutal close-quarters combat of mountain warfare."

 SWI_armour_defense:0 "Armoured Reserves"
 SWI_armour_defense_desc:0 "Even a defensive strategy requires armoured punch. We shall maintain a reserve of tanks and armoured vehicles ready to counterattack any breakthrough and drive the enemy back before he can consolidate his gains."

 SWI_end_defense:0 "The Swiss Defense Army"
 SWI_end_defense_desc:0 "The work is complete. Switzerland has been transformed into a true fortress nation — every mountain pass covered, every valley defended, every soldier trained and ready. Let our enemies come. They will find no easy road here."

 # Center Branch
 SWI_gun_advanments:0 "Small Arms Advancements"
 SWI_gun_advanments_desc:0 "The rifle and the machine gun remain the backbone of any army. We shall invest in the development and procurement of the finest small arms available, ensuring every Swiss soldier goes into battle with a weapon he can trust with his life."

 SWI_mandatory_army_time:0 "Mandatory Military Service"
 SWI_mandatory_army_time_desc:0 "Every able-bodied Swiss man shall serve his time in the army. Mandatory military service will swell our reserves, instil discipline across Swiss society and ensure that when the call comes, Switzerland can field a force far larger than our population might suggest."

 SWI_logistics_focus:0 "Military Logistics"
 SWI_logistics_focus_desc:0 "An army marches on its stomach and fights on its supply lines. We shall overhaul our military logistics from the ground up — ensuring ammunition, food and equipment reach the front on time, every time, no matter the terrain."

 SWI_officer_devlopment:0 "Officer Development Program"
 SWI_officer_devlopment_desc:0 "A well-trained officer corps is the spine of any great army. We shall establish rigorous programs to identify, train and promote the finest military minds in Switzerland — men who can lead with both discipline and initiative."

 SWI_re_organize_army:0 "Reorganise the Army"
 SWI_re_organize_army_desc:0 "With our defensive and offensive doctrines now fully developed, the time has come to reorganise the Swiss Army from top to bottom. New command structures, fresh divisions and a unified strategic vision will make Switzerland's military a force to be reckoned with."

 # Offense Branch
 SWI_offense_plan:0 "The Offensive Plan"
 SWI_offense_plan_desc:0 "Defence alone will never secure Switzerland's future. We must be prepared to take the fight to the enemy when necessary. Our generals will begin drawing up offensive war plans — studying how best to strike fast, strike hard and seize the initiative."

 SWI_study_new_offense_plans:0 "Study Offensive Doctrine"
 SWI_study_new_offense_plans_desc:0 "Modern offensive warfare demands speed, coordination and aggression. Our officers shall study the latest doctrines of attack — from the infiltration tactics of the Great War to the lightning thrusts of modern armoured warfare."

 SWI_doctrine_advancments_offense:0 "Offensive Infantry Doctrine"
 SWI_doctrine_advancments_offense_desc:0 "The Swiss infantryman has long been forged in the tradition of defence, but he is capable of far more. We shall retrain our foot soldiers in the arts of assault — fire and movement, breaching fortified positions and the relentless forward pressure that breaks an enemy's will to fight."

 SWI_ready_army_offense:0 "Ready the Army for Offense"
 SWI_ready_army_offense_desc:0 "Doctrine is nothing without preparation. Our forces shall undergo intensive offensive training — live exercises, war games and field manoeuvres designed to sharpen every unit's ability to attack with speed and precision."

 SWI_war_logistics_offense:0 "Offensive War Logistics"
 SWI_war_logistics_offense_desc:0 "Attacking is far more demanding on supply lines than defending. We shall build dedicated offensive logistics capacity — forward depots, rapid resupply columns and engineering units capable of keeping an advancing army fed and armed across any terrain."

 SWI_tank_offense:0 "Armoured Offensive Doctrine"
 SWI_tank_offense_desc:0 "The tank is the spearhead of modern offensive warfare. We shall develop bold armoured tactics — deep thrusts into enemy lines, exploitation of breakthroughs and the coordination of armour with infantry and artillery to shatter enemy defences."

 SWI_special_forces_offense:0 "Special Forces"
 SWI_special_forces_offense_desc:0 "Not every objective can be taken by brute force. We shall raise elite special forces units trained in sabotage, infiltration and raids behind enemy lines — silent warriors who can strike where the enemy least expects it."

 SWI_end_offense_plan_of_the_army:0 "The Swiss Offensive Army"
 SWI_end_offense_plan_of_the_army_desc:0 "The transformation is complete. Switzerland's army is no longer merely a shield — it is a sword. Hardened by training, equipped with the finest weapons and guided by bold doctrine, our forces stand ready to carry the Swiss banner into the heart of the enemy."

  SWI_army_of_swiss_defense:0 "Army of Switzerland"
 SWI_army_of_swiss_defense_desc:0 "Our soldiers stand ready at every pass and valley. The Swiss Army has been drilled in the art of defensive warfare — making our homeland a fortress that any invader will pay dearly to enter."

 SWI_army_of_swiss_defense_1:0 "Army of Switzerland"
 SWI_army_of_swiss_defense_1_desc:0 "Our defensive capabilities have grown stronger still. Elite special forces units now patrol the mountains and forests, ready to strike at any enemy foolish enough to test Swiss resolve."

 SWI_army_of_swiss_defense_2:0 "Army of Switzerland"
 SWI_army_of_swiss_defense_2_desc:0 "The Swiss Army stands at the peak of its defensive power. Every ridge fortified, every pass covered and every soldier battle-ready. Switzerland is not merely defended — she is impregnable."

 SWI_army_of_swiss_offense:0 "Swiss Offensive Army"
 SWI_army_of_swiss_offense_desc:0 "Switzerland's soldiers have shed their purely defensive mindset. New offensive doctrines and aggressive training have given our army the teeth it needs to carry the fight to the enemy when the moment demands it."

 SWI_army_of_swiss_offense_1:0 "Swiss Offensive Army"
 SWI_army_of_swiss_offense_1_desc:0 "Our offensive capability grows ever sharper. Special forces units trained in deep raiding and lightning assault now spearhead our attacks, striking with precision and ferocity before the enemy can react."

 SWI_army_of_swiss_offense_2:0 "Swiss Offensive Army"
 SWI_army_of_swiss_offense_2_desc:0 "The Swiss Army has reached its full offensive potential. A disciplined, aggressive and battle-hardened force, our soldiers are now capable of breaking any enemy line and exploiting the chaos that follows with ruthless efficiency."

 SWI_armour_defense_idea:0 "Armoured Reserves"
 SWI_armour_defense_idea_desc:0 "Rows of Swiss tanks and armoured vehicles sit fuelled and ready in hardened positions across the country. Should any enemy break through our defensive lines they will find themselves met not by retreat but by a crushing armoured counterattack that drives them back the way they came."